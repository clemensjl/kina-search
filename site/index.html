<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kina Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDF0F2; --card:#FFFFFF; --ink:#16222E; --muted:#5C6B7A;
  --stamp:#C53A21; --line:#D4DBE1; --line-strong:#B8C2CB;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--paper)}
body{
  font-family:"IBM Plex Sans",system-ui,sans-serif;color:var(--ink);
  min-height:100vh;
}
::selection{background:var(--stamp);color:#fff}

/* ---------- Manifest-Kopf ---------- */
header{
  border-bottom:2px solid var(--ink);
  background:var(--paper);
  position:sticky;top:0;z-index:20;
}
.head-inner{
  max-width:1400px;margin:0 auto;padding:14px 20px 0;
}
.head-top{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
h1{
  font-family:"Barlow Condensed",sans-serif;font-weight:700;
  font-size:clamp(26px,4vw,38px);letter-spacing:.04em;text-transform:uppercase;
  line-height:1;
}
h1 .tick{color:var(--stamp)}
.manifest{
  font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted);
  letter-spacing:.02em;white-space:nowrap;
}
.manifest b{color:var(--stamp);font-weight:500}
.searchrow{margin:12px 0 10px;display:flex;gap:10px;flex-wrap:wrap}
#q{
  flex:1;min-width:220px;
  font-family:"IBM Plex Sans",sans-serif;font-size:17px;
  padding:11px 14px;border:1.5px solid var(--ink);border-radius:6px;
  background:var(--card);color:var(--ink);outline:none;
}
#q:focus{border-color:var(--stamp);box-shadow:0 0 0 3px rgba(197,58,33,.15)}
#q::placeholder{color:var(--muted)}
select{
  font-family:"IBM Plex Mono",monospace;font-size:13px;
  padding:10px 10px;border:1.5px solid var(--line-strong);border-radius:6px;
  background:var(--card);color:var(--ink);cursor:pointer;max-width:200px;
}
select:focus-visible,#q:focus-visible,.chip:focus-visible,.card:focus-visible{
  outline:2px solid var(--stamp);outline-offset:2px;
}
.chips{
  display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;
  scrollbar-width:thin;
}
.chip{
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:14px;
  letter-spacing:.06em;text-transform:uppercase;
  padding:6px 12px;border:1.5px solid var(--line-strong);border-radius:99px;
  background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:border-color .12s,color .12s;
}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}

/* ---------- Grid ---------- */
main{max-width:1400px;margin:0 auto;padding:18px 20px 60px}
#grid{
  display:grid;gap:14px;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
}
@media(max-width:480px){#grid{grid-template-columns:repeat(2,1fr);gap:10px}}
.card{
  display:flex;flex-direction:column;text-decoration:none;color:inherit;
  background:var(--card);border:1px solid var(--line);border-radius:6px;
  overflow:hidden;border-top:2px solid var(--line);
  transition:border-color .12s;
}
.card:hover{border-color:var(--ink);border-top-color:var(--stamp)}
.thumb{
  aspect-ratio:1;background:var(--paper);position:relative;overflow:hidden;
  border-bottom:1px solid var(--line);
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .ph{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:34px;
  color:var(--line-strong);letter-spacing:.05em;
}
.card-body{padding:9px 10px 10px;display:flex;flex-direction:column;gap:5px;flex:1}
.name{
  font-size:13px;font-weight:500;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  min-height:2.7em;
}
.meta{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-top:auto}
.price{
  font-family:"IBM Plex Mono",monospace;font-size:12.5px;font-weight:500;
  color:var(--stamp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%;
}
.src{
  font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#more{
  display:block;margin:26px auto 0;
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:16px;
  letter-spacing:.08em;text-transform:uppercase;
  padding:10px 34px;border:1.5px solid var(--ink);border-radius:6px;
  background:var(--card);color:var(--ink);cursor:pointer;
}
#more:hover{background:var(--ink);color:var(--paper)}
#empty{
  padding:70px 20px;text-align:center;color:var(--muted);
}
#empty .big{
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:24px;
  text-transform:uppercase;letter-spacing:.06em;color:var(--ink);margin-bottom:8px;
}
#loading{
  padding:80px 20px;text-align:center;color:var(--muted);
  font-family:"IBM Plex Mono",monospace;font-size:13px;
}
footer{
  border-top:1px solid var(--line-strong);padding:16px 20px 40px;
  font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);
  max-width:1400px;margin:0 auto;
}
@media(prefers-reduced-motion:no-preference){
  .card{animation:in .18s ease both}
  @keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="head-top">
      <h1>Kina<span class="tick">/</span>Search</h1>
      <div class="manifest" id="manifest">Lade Manifest &hellip;</div>
    </div>
    <div class="searchrow">
      <input id="q" type="search" placeholder="Suchen: Marke, Item, Kategorie &hellip;" autocomplete="off" autofocus>
      <select id="src" aria-label="Quelle"><option value="">Alle Quellen</option></select>
      <select id="sort" aria-label="Sortierung">
        <option value="rel">Sortierung: Standard</option>
        <option value="pa">Preis aufsteigend</option>
        <option value="pd">Preis absteigend</option>
        <option value="name">Name A&ndash;Z</option>
      </select>
    </div>
    <div class="chips" id="chips" role="tablist" aria-label="Kategorie"></div>
  </div>
</header>

<main>
  <div id="loading">Lade 15.000+ Artikel &hellip;</div>
  <div id="grid" hidden></div>
  <div id="empty" hidden>
    <div class="big">Kein Treffer</div>
    Anderen Suchbegriff versuchen oder Filter zur&uuml;cksetzen.
  </div>
  <button id="more" hidden>Mehr laden</button>
</main>

<footer id="foot"></footer>

<script>
"use strict";
const $=s=>document.querySelector(s);
const BATCH=120;
let DATA=[], view=[], shown=0, activeCat="";

const fold=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");

/* ersten USD-/Dollar-Wert als Sortierzahl ziehen, sonst beliebige Zahl */
function priceNum(p){
  if(!p) return NaN;
  let m=p.match(/(?:\$|USD)\s*([\d.,]+)/i) || p.match(/([\d.,]+)\s*(?:\$|USD)/i);
  if(!m) m=p.match(/([\d]+(?:[.,]\d+)?)/);
  if(!m) return NaN;
  return parseFloat(m[1].replace(/,(?=\d{3}\b)/g,"").replace(",","."));
}

function apply(){
  const q=fold($("#q").value.trim());
  const src=$("#src").value;
  const toks=q.split(/\s+/).filter(Boolean);
  view=DATA.filter(it=>{
    if(activeCat && it.c!==activeCat) return false;
    if(src && it.s!==src) return false;
    if(toks.length){
      const hay=it._h;
      for(const t of toks) if(!hay.includes(t)) return false;
    }
    return true;
  });
  const s=$("#sort").value;
  if(s==="name") view.sort((a,b)=>a.n.localeCompare(b.n,"de"));
  else if(s==="pa"||s==="pd"){
    const dir=s==="pa"?1:-1;
    view.sort((a,b)=>{
      const x=priceNum(a.p),y=priceNum(b.p);
      if(isNaN(x)&&isNaN(y))return 0;
      if(isNaN(x))return 1;
      if(isNaN(y))return -1;
      return (x-y)*dir;
    });
  }
  shown=0;
  $("#grid").innerHTML="";
  $("#empty").hidden=view.length>0;
  $("#grid").hidden=view.length===0;
  renderMore();
  stamp();
}

function stamp(){
  const total=DATA.length.toLocaleString("de-AT");
  const hits=view.length.toLocaleString("de-AT");
  const srcs=new Set(DATA.map(i=>i.s)).size;
  $("#manifest").innerHTML=
    `<b>${hits}</b> Treffer &middot; ${total} Artikel &middot; ${srcs} Quellen`;
}

function renderMore(){
  const frag=document.createDocumentFragment();
  const end=Math.min(shown+BATCH,view.length);
  for(let i=shown;i<end;i++) frag.appendChild(card(view[i]));
  $("#grid").appendChild(frag);
  shown=end;
  $("#more").hidden=shown>=view.length;
}

function card(it){
  const a=document.createElement("a");
  a.className="card";
  a.href=it.u; a.target="_blank"; a.rel="noopener noreferrer";
  const initials=it.n.replace(/[^A-Za-z0-9 ]/g,"").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()||"?";
  const t=document.createElement("div");
  t.className="thumb";
  t.innerHTML=`<div class="ph">${initials}</div>`;
  if(it.i){
    const img=document.createElement("img");
    img.loading="lazy"; img.decoding="async"; img.referrerPolicy="no-referrer";
    img.alt="";
    img.onerror=()=>img.remove();
    img.src=it.i;
    t.appendChild(img);
  }
  const b=document.createElement("div");
  b.className="card-body";
  const nm=document.createElement("div"); nm.className="name"; nm.textContent=it.n;
  const meta=document.createElement("div"); meta.className="meta";
  const pr=document.createElement("span"); pr.className="price"; pr.textContent=it.p||"";
  const sc=document.createElement("span"); sc.className="src"; sc.textContent=it.s;
  meta.append(pr,sc); b.append(nm,meta); a.append(t,b);
  return a;
}

function buildFilters(){
  const cats=[...new Set(DATA.map(i=>i.c))];
  const order=["Schuhe","Shirts & Tees","Hoodies & Sweater","Jacken","Hosen & Shorts","Trikots","Taschen","Uhren","Schmuck & Accessoires","Parfum","Elektronik","Sonstiges"];
  cats.sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  const chips=$("#chips");
  const all=document.createElement("button");
  all.className="chip on"; all.textContent="Alle"; all.dataset.cat="";
  chips.appendChild(all);
  for(const c of cats){
    const el=document.createElement("button");
    el.className="chip"; el.textContent=c; el.dataset.cat=c;
    chips.appendChild(el);
  }
  chips.addEventListener("click",e=>{
    const btn=e.target.closest(".chip"); if(!btn) return;
    chips.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===btn));
    activeCat=btn.dataset.cat;
    apply();
  });
  const srcs=[...new Set(DATA.map(i=>i.s))].sort();
  for(const s of srcs){
    const o=document.createElement("option");
    o.value=s; o.textContent=s;
    $("#src").appendChild(o);
  }
}

let deb;
$("#q").addEventListener("input",()=>{clearTimeout(deb);deb=setTimeout(apply,90)});
$("#src").addEventListener("change",apply);
$("#sort").addEventListener("change",apply);
$("#more").addEventListener("click",renderMore);

fetch("items.json")
  .then(r=>r.json())
  .then(d=>{
    DATA=d;
    for(const it of DATA) it._h=fold(it.n+" "+it.c+" "+it.s+" "+(it.t||""));
    $("#loading").hidden=true;
    buildFilters();
    apply();
    $("#foot").textContent=
      `Kina Search - aggregiert aus ${new Set(DATA.map(i=>i.s)).size} Spreadsheets. `+
      `Preise wie in der Quelle angegeben, ohne Gewaehr. Links oeffnen extern.`;
  })
  .catch(()=>{$("#loading").textContent="items.json konnte nicht geladen werden.";});
</script>
</body>
</html>
