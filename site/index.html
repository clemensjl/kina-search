<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kina Search</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2316222E'/%3E%3Ctext x='16' y='23' font-family='Arial Black,sans-serif' font-size='19' font-weight='900' fill='%23EDF0F2' text-anchor='middle'%3EK%3C/text%3E%3Ctext x='23' y='23' font-family='Arial Black,sans-serif' font-size='19' font-weight='900' fill='%23C53A21' text-anchor='middle'%3E/%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDF0F2; --card:#FFFFFF; --ink:#16222E; --muted:#5C6B7A;
  --stamp:#C53A21; --line:#D4DBE1; --line-strong:#B8C2CB;
}
*{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
html{background:var(--paper)}
body{
  font-family:"IBM Plex Sans",system-ui,sans-serif;color:var(--ink);
  min-height:100vh;
}
::selection{background:var(--stamp);color:#fff}

/* ---------- Manifest-Kopf ---------- */
header{
  border-bottom:2px solid var(--ink);
  background:var(--paper);
  position:sticky;top:0;z-index:20;
}
.head-inner{
  max-width:1400px;margin:0 auto;padding:14px 20px 0;
}
.head-top{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
h1{
  font-family:"Barlow Condensed",sans-serif;font-weight:700;
  font-size:clamp(26px,4vw,38px);letter-spacing:.04em;text-transform:uppercase;
  line-height:1;
}
h1 .tick{color:var(--stamp)}
.manifest{
  font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--muted);
  letter-spacing:.02em;white-space:nowrap;
}
.manifest b{color:var(--stamp);font-weight:500}
.searchrow{margin:12px 0 10px;display:flex;gap:10px;flex-wrap:wrap}
#q{
  flex:1;min-width:220px;
  font-family:"IBM Plex Sans",sans-serif;font-size:17px;
  padding:11px 14px;border:1.5px solid var(--ink);border-radius:6px;
  background:var(--card);color:var(--ink);outline:none;
}
#q:focus{border-color:var(--stamp);box-shadow:0 0 0 3px rgba(197,58,33,.15)}
#q::placeholder{color:var(--muted)}
select{
  font-family:"IBM Plex Mono",monospace;font-size:13px;
  padding:10px 10px;border:1.5px solid var(--line-strong);border-radius:6px;
  background:var(--card);color:var(--ink);cursor:pointer;max-width:200px;
}
select:focus-visible,#q:focus-visible,.chip:focus-visible,.card:focus-visible{
  outline:2px solid var(--stamp);outline-offset:2px;
}
.chips{
  display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;
  scrollbar-width:thin;
}
.chip{
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:14px;
  letter-spacing:.06em;text-transform:uppercase;
  padding:6px 12px;border:1.5px solid var(--line-strong);border-radius:99px;
  background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:border-color .12s,color .12s;
}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}

/* ---------- Grid ---------- */
main{max-width:1400px;margin:0 auto;padding:18px 20px 60px}
#grid{
  display:grid;gap:14px;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
}
@media(max-width:480px){#grid{grid-template-columns:repeat(2,1fr);gap:10px}}
.card{
  display:flex;flex-direction:column;text-decoration:none;color:inherit;
  background:var(--card);border:1px solid var(--line);border-radius:6px;
  overflow:hidden;border-top:2px solid var(--line);
  transition:border-color .12s;
}
.card:hover{border-color:var(--ink);border-top-color:var(--stamp)}
.thumb{
  aspect-ratio:1;background:#fff;position:relative;overflow:hidden;
  border-bottom:1px solid var(--line);
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .ph{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:34px;
  color:var(--line-strong);letter-spacing:.05em;
}
.card-body{padding:9px 10px 10px;display:flex;flex-direction:column;gap:5px;flex:1}
.name{
  font-size:13px;font-weight:500;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  min-height:2.7em;
}
.meta{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-top:auto}
.price{
  font-family:"IBM Plex Mono",monospace;font-size:12.5px;font-weight:500;
  color:var(--stamp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;
}
.src{
  font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#more{
  display:block;margin:26px auto 0;
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:16px;
  letter-spacing:.08em;text-transform:uppercase;
  padding:10px 34px;border:1.5px solid var(--ink);border-radius:6px;
  background:var(--card);color:var(--ink);cursor:pointer;
}
#more:hover{background:var(--ink);color:var(--paper)}
#empty{
  padding:70px 20px;text-align:center;color:var(--muted);
}
#empty .big{
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:24px;
  text-transform:uppercase;letter-spacing:.06em;color:var(--ink);margin-bottom:8px;
}
#loading{
  padding:80px 20px;text-align:center;color:var(--muted);
  font-family:"IBM Plex Mono",monospace;font-size:13px;
}
footer{
  border-top:1px solid var(--line-strong);padding:16px 20px 40px;
  font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);
  max-width:1400px;margin:0 auto;
}
@media(prefers-reduced-motion:no-preference){
  .card{animation:in .18s ease both}
  @keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .modal{animation:pop .16s ease both}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
}

/* ---------- Produktseite (Modal) ---------- */
.modal-back{
  position:fixed;inset:0;background:rgba(22,34,46,.6);z-index:50;
  display:flex;align-items:flex-start;justify-content:center;
  padding:4vh 16px;overflow-y:auto;
}
.modal{
  background:var(--card);border-radius:8px;max-width:880px;width:100%;
  border-top:3px solid var(--stamp);position:relative;
}
.modal-close{
  position:absolute;top:10px;right:10px;z-index:2;
  width:34px;height:34px;border:1.5px solid var(--line-strong);border-radius:6px;
  background:var(--card);color:var(--ink);cursor:pointer;
  font-family:"IBM Plex Mono",monospace;font-size:16px;line-height:1;
}
.modal-close:hover{border-color:var(--stamp);color:var(--stamp)}
.modal-grid{display:grid;grid-template-columns:340px 1fr}
@media(max-width:720px){.modal-grid{grid-template-columns:1fr}}
.modal-img{
  background:#fff;border-right:1px solid var(--line);border-radius:8px 0 0 0;
  display:flex;align-items:center;justify-content:center;
  aspect-ratio:1;overflow:hidden;
}
@media(max-width:720px){.modal-img{border-right:none;border-bottom:1px solid var(--line);border-radius:8px 8px 0 0;max-height:46vh}}
.modal-img img{width:100%;height:100%;object-fit:contain}
.modal-img .ph{
  font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:56px;
  color:var(--line-strong);
}
.modal-info{padding:20px 22px 22px;min-width:0}
.modal-brand{
  font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--stamp);margin-bottom:5px;
}
.modal-name{
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:24px;
  line-height:1.15;margin-bottom:10px;padding-right:30px;
}
.modal-price{display:flex;align-items:baseline;gap:12px;margin-bottom:6px}
.modal-price .eur{
  font-family:"IBM Plex Mono",monospace;font-weight:500;font-size:26px;color:var(--stamp);
}
.modal-price .cny{
  font-family:"IBM Plex Mono",monospace;font-size:14px;color:var(--muted);
}
.modal-meta{
  font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);
  margin-bottom:14px;line-height:1.7;
}
.mod-sec{
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:13px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  border-top:1px solid var(--line);padding-top:12px;margin:12px 0 8px;
}
.linkgrid{display:flex;flex-wrap:wrap;gap:6px}
.linkgrid a{
  font-family:"IBM Plex Mono",monospace;font-size:12px;text-decoration:none;
  padding:6px 10px;border:1.5px solid var(--line-strong);border-radius:6px;
  color:var(--ink);background:var(--card);white-space:nowrap;
}
.linkgrid a:hover{border-color:var(--stamp);color:var(--stamp)}
.linkgrid a.fav{background:var(--ink);border-color:var(--ink);color:var(--paper);font-weight:500}
.linkgrid a.fav:hover{background:var(--stamp);border-color:var(--stamp);color:#fff}
.orig-btn{
  display:inline-block;text-decoration:none;
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:15px;
  letter-spacing:.08em;text-transform:uppercase;
  padding:9px 18px;border-radius:6px;background:var(--ink);color:var(--paper);
  border:1.5px solid var(--ink);
}
.orig-btn:hover{background:var(--stamp);border-color:var(--stamp)}
body.modal-open{overflow:hidden}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="head-top">
      <h1>Kina<span class="tick">/</span>Search</h1>
      <div class="manifest" id="manifest">Lade Manifest &hellip;</div>
    </div>
    <div class="searchrow">
      <input id="q" type="search" placeholder="Suchen: Marke, Item, Kategorie &hellip;" autocomplete="off" autofocus>
      <select id="src" aria-label="Quelle"><option value="">Alle Quellen</option></select>
      <select id="sort" aria-label="Sortierung">
        <option value="rel">Sortierung: Marke</option>
        <option value="pa">Preis aufsteigend</option>
        <option value="pd">Preis absteigend</option>
        <option value="name">Name A&ndash;Z</option>
      </select>
    </div>
    <div class="chips" id="chips" role="tablist" aria-label="Kategorie"></div>
  </div>
</header>

<main>
  <div id="loading">Lade 15.000+ Artikel &hellip;</div>
  <div id="grid" hidden></div>
  <div id="empty" hidden>
    <div class="big">Kein Treffer</div>
    Anderen Suchbegriff versuchen oder Filter zur&uuml;cksetzen.
  </div>
  <button id="more" hidden>Mehr laden</button>
</main>

<footer id="foot"></footer>

<script>
"use strict";
const $=s=>document.querySelector(s);
const BATCH=120;
let DATA=[], view=[], shown=0, activeCat="";
let RATES={CNY:7.8,USD:1.08,GBP:0.85,EUR:1};

const fold=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");

/* Agent-Link-Templates: {id} = Item-ID, {url} = urlencodierte Original-URL.
   pf: wd=Weidian, tb=Taobao, al=1688 */
/* Verifiziert Jul 2026 (cn-links/JadeShip/Live-Checks).
   Litbuy = unser favorisierter Agent (fav). */
const AGENTS=[
  {n:"Litbuy",fav:true,t:{wd:"https://litbuy.com/products/details?id={id}&channel=WEIDIAN",tb:"https://litbuy.com/products/details?id={id}&channel=TAOBAO",al:"https://litbuy.com/products/details?id={id}&channel=1688"}},
  {n:"Kakobuy",t:{"*":"https://www.kakobuy.com/item/details?url={url}"}},
  {n:"ACBuy",t:{wd:"https://www.acbuy.com/product?id={id}&source=WD",tb:"https://www.acbuy.com/product?id={id}&source=TB",al:"https://www.acbuy.com/product?id={id}&source=AL"}},
  {n:"Mulebuy",t:{wd:"https://mulebuy.com/product/?shop_type=weidian&id={id}",tb:"https://mulebuy.com/product/?shop_type=taobao&id={id}",al:"https://mulebuy.com/product/?shop_type=ali_1688&id={id}"}},
  {n:"Oopbuy",t:{wd:"https://www.oopbuy.com/product/weidian/{id}",tb:"https://www.oopbuy.com/product/1/{id}",al:"https://www.oopbuy.com/product/0/{id}"}},
  {n:"Hoobuy",t:{wd:"https://hoobuy.com/product/2/{id}",tb:"https://hoobuy.com/product/1/{id}",al:"https://hoobuy.com/product/0/{id}"}},
  {n:"Joyagoo",t:{wd:"https://joyagoo.com/product?id={id}&platform=WEIDIAN",tb:"https://joyagoo.com/product?id={id}&platform=TAOBAO",al:"https://joyagoo.com/product?id={id}&platform=ALI_1688"}},
  {n:"USFans",t:{wd:"https://www.usfans.com/product/3/{id}",tb:"https://www.usfans.com/product/2/{id}",al:"https://www.usfans.com/product/1/{id}"}},
  {n:"Superbuy",t:{"*":"https://www.superbuy.com/en/page/buy?from=search-input&url={url}"}},
  {n:"Sugargoo",t:{"*":"https://www.sugargoo.com/#/home/productDetail?productLink={url}"}},
  {n:"CSSBuy",t:{wd:"https://www.cssbuy.com/item-micro-{id}.html",tb:"https://www.cssbuy.com/item-{id}.html",al:"https://www.cssbuy.com/item-1688-{id}.html"}},
  {n:"AllChinaBuy",t:{"*":"https://www.allchinabuy.com/en/page/buy?from=search-input&url={url}"}},
  {n:"Orientdig",t:{wd:"https://orientdig.com/product/?shop_type=weidian&id={id}",tb:"https://orientdig.com/product/?shop_type=taobao&id={id}",al:"https://orientdig.com/product/?shop_type=ali_1688&id={id}"}},
  {n:"LovegoBuy",t:{wd:"https://www.lovegobuy.com/product?id={id}&shop_type=weidian",tb:"https://www.lovegobuy.com/product?id={id}&shop_type=taobao",al:"https://www.lovegobuy.com/product?id={id}&shop_type=ali_1688"}},
  {n:"OOTDBuy",t:{wd:"https://www.ootdbuy.com/goods/details?id={id}&channel=weidian",tb:"https://www.ootdbuy.com/goods/details?id={id}&channel=taobao",al:"https://www.ootdbuy.com/goods/details?id={id}&channel=1688"}},
  {n:"HipoBuy",t:{wd:"https://hipobuy.com/goods/details?id={id}&channel=WEIDIAN",tb:"https://hipobuy.com/goods/details?id={id}&channel=TAOBAO",al:"https://hipobuy.com/goods/details?id={id}&channel=1688"}},
  {n:"PonyBuy",t:{wd:"https://www.ponybuy.com/en-gb/goods?product_id={id}&platform=weidian",tb:"https://www.ponybuy.com/en-gb/goods?product_id={id}&platform=taobao",al:"https://www.ponybuy.com/en-gb/goods?product_id={id}&platform=1688"}},
  {n:"LoongBuy",t:{"*":"https://www.loongbuy.com/product-details?url={url}"}},
  {n:"iTaoBuy",t:{"*":"https://www.itaobuy.com/product-detail?url={url}"}},
  {n:"Basetao",t:{wd:"https://www.basetao.com/best-taobao-agent-service/products/agent/weidian/{id}.html",tb:"https://www.basetao.com/best-taobao-agent-service/products/agent/taobao/{id}.html",al:"https://www.basetao.com/best-taobao-agent-service/products/agent/1688/{id}.html"}},
  {n:"EastMallBuy",t:{"*":"https://eastmallbuy.com/index/item/index.html?searchlang=en&url={url}"}},
];

/* QC-Foto-Datenbanken (Jul 2026: qc.photos + finding.photos tot).
   Templates: pro Plattform ({id}) oder generisch ({url}). */
const QCDBS=[
  {n:"FindQC",t:{wd:"https://findqc.com/detail/WD/{id}",tb:"https://findqc.com/detail/TB/{id}",al:"https://findqc.com/detail/AL/{id}"}},
  {n:"JadeShip",t:{wd:"https://www.jadeship.com/item/weidian/{id}",tb:"https://www.jadeship.com/item/taobao/{id}",al:"https://www.jadeship.com/item/1688/{id}"}},
  {n:"UUFinds",t:{"*":"https://www.uufinds.com/qc"}},
  {n:"Kakobuy QC",t:{"*":"https://www.kakobuy.com/item/details?url={url}"}},
  {n:"Litbuy QC",t:{wd:"https://litbuy.com/products/details?id={id}&channel=WEIDIAN",tb:"https://litbuy.com/products/details?id={id}&channel=TAOBAO",al:"https://litbuy.com/products/details?id={id}&channel=1688"}},
  {n:"OOTDBuy QC",t:{wd:"https://www.ootdbuy.com/goods/details?id={id}&channel=weidian",tb:"https://www.ootdbuy.com/goods/details?id={id}&channel=taobao",al:"https://www.ootdbuy.com/goods/details?id={id}&channel=1688"}},
  {n:"FinderQC",t:{"*":"https://finderqc.com/"}},
];

function rawUrl(it){
  if(it.pf==="wd") return "https://weidian.com/item.html?itemID="+it.pid;
  if(it.pf==="tb") return "https://item.taobao.com/item.htm?id="+it.pid;
  if(it.pf==="al") return "https://detail.1688.com/offer/"+it.pid+".html";
  return it.u||"";
}
function fill(tpl,it){
  return tpl.replace("{id}",it.pid||"").replace("{url}",encodeURIComponent(rawUrl(it)));
}
function eurOf(it){
  if(it.pv==null||!RATES[it.pc]) return NaN;
  return it.pv/RATES[it.pc];
}
const fmtEUR=v=>"€ "+v.toLocaleString("de-AT",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtCNY=v=>"¥ "+v.toLocaleString("de-AT",{maximumFractionDigits:0});

function apply(){
  const q=fold($("#q").value.trim());
  const src=$("#src").value;
  const toks=q.split(/\s+/).filter(Boolean);
  view=DATA.filter(it=>{
    if(activeCat && it.c!==activeCat) return false;
    if(src && it.s!==src) return false;
    if(toks.length){
      const hay=it._h;
      for(const t of toks) if(!hay.includes(t)) return false;
    }
    return true;
  });
  const s=$("#sort").value;
  if(s==="name") view.sort((a,b)=>a.n.localeCompare(b.n,"de"));
  else if(s==="pa"||s==="pd"){
    const dir=s==="pa"?1:-1;
    view.sort((a,b)=>{
      const x=eurOf(a),y=eurOf(b);
      if(isNaN(x)&&isNaN(y))return 0;
      if(isNaN(x))return 1;
      if(isNaN(y))return -1;
      return (x-y)*dir;
    });
  }
  shown=0;
  $("#grid").innerHTML="";
  $("#empty").hidden=view.length>0;
  $("#grid").hidden=view.length===0;
  renderMore();
  stamp();
}

function stamp(){
  const total=DATA.length.toLocaleString("de-AT");
  const hits=view.length.toLocaleString("de-AT");
  const srcs=new Set(DATA.map(i=>i.s)).size;
  $("#manifest").innerHTML=
    `<b>${hits}</b> Treffer &middot; ${total} Artikel &middot; ${srcs} Quellen`;
}

function renderMore(){
  const frag=document.createDocumentFragment();
  const end=Math.min(shown+BATCH,view.length);
  for(let i=shown;i<end;i++) frag.appendChild(card(view[i]));
  $("#grid").appendChild(frag);
  shown=end;
  $("#more").hidden=shown>=view.length;
}

function card(it){
  const a=document.createElement("a");
  a.className="card";
  a.href=rawUrl(it); a.target="_blank"; a.rel="noopener noreferrer";
  a.addEventListener("click",e=>{
    if(e.ctrlKey||e.metaKey||e.shiftKey||e.button===1) return;
    e.preventDefault(); openModal(it);
  });
  const initials=it.n.replace(/[^A-Za-z0-9 ]/g,"").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()||"?";
  const t=document.createElement("div");
  t.className="thumb";
  t.innerHTML=`<div class="ph">${initials}</div>`;
  if(it.i){
    const img=document.createElement("img");
    img.loading="lazy"; img.decoding="async"; img.referrerPolicy="no-referrer";
    img.alt="";
    img.onerror=()=>img.remove();
    img.onload=()=>{const ph=t.querySelector(".ph"); if(ph) ph.remove();};
    img.src=it.i;
    t.appendChild(img);
  }
  const b=document.createElement("div");
  b.className="card-body";
  const nm=document.createElement("div"); nm.className="name"; nm.textContent=it.n;
  const meta=document.createElement("div"); meta.className="meta";
  const pr=document.createElement("span"); pr.className="price";
  const eur=eurOf(it);
  pr.textContent=isNaN(eur)?(it.p||""):fmtEUR(eur);
  const sc=document.createElement("span"); sc.className="src"; sc.textContent=it.s;
  meta.append(pr,sc); b.append(nm,meta); a.append(t,b);
  return a;
}

/* ---------- Produktseite ---------- */
function openModal(it){
  const back=document.createElement("div");
  back.className="modal-back";
  const hasRef=!!it.pf;
  const eur=eurOf(it);
  const cny=isNaN(eur)?NaN:eur*RATES.CNY;
  const raw=rawUrl(it);

  const m=document.createElement("div");
  m.className="modal";
  m.setAttribute("role","dialog");
  m.setAttribute("aria-label",it.n);

  const close=document.createElement("button");
  close.className="modal-close"; close.textContent="×";
  close.setAttribute("aria-label","Schliessen");

  const grid=document.createElement("div"); grid.className="modal-grid";
  const imgBox=document.createElement("div"); imgBox.className="modal-img";
  if(it.i){
    const img=document.createElement("img");
    img.alt=""; img.referrerPolicy="no-referrer";
    img.onerror=()=>{img.remove();imgBox.innerHTML='<div class="ph">'+(it.b||"?").slice(0,2).toUpperCase()+"</div>";};
    img.src=it.i;
    imgBox.appendChild(img);
  }else{
    imgBox.innerHTML='<div class="ph">'+(it.b||it.n).slice(0,2).toUpperCase()+"</div>";
  }

  const info=document.createElement("div"); info.className="modal-info";
  const brand=document.createElement("div"); brand.className="modal-brand";
  brand.textContent=it.b||"Ohne Marke";
  const name=document.createElement("div"); name.className="modal-name"; name.textContent=it.n;
  const price=document.createElement("div"); price.className="modal-price";
  if(!isNaN(eur)){
    price.innerHTML='<span class="eur">'+fmtEUR(eur)+'</span><span class="cny">'+fmtCNY(cny)+"</span>";
  }else if(it.p){
    price.innerHTML='<span class="eur" style="font-size:18px">'+it.p+"</span>";
  }else{
    price.innerHTML='<span class="cny">Preis in der Quelle nicht angegeben</span>';
  }
  const meta=document.createElement("div"); meta.className="modal-meta";
  meta.textContent=[it.c,it.s,it.t].filter(Boolean).join("  ·  ");

  info.append(brand,name,price,meta);

  if(raw){
    const sec0=document.createElement("div"); sec0.className="mod-sec";
    sec0.textContent=it.pf==="wd"?"Original (Weidian)":it.pf==="tb"?"Original (Taobao)":it.pf==="al"?"Original (1688)":"Original-Link";
    const ob=document.createElement("a");
    ob.className="orig-btn"; ob.href=raw; ob.target="_blank"; ob.rel="noopener noreferrer";
    ob.textContent="Produkt öffnen";
    info.append(sec0,ob);
  }

  const secA=document.createElement("div"); secA.className="mod-sec"; secA.textContent="Bei Agent öffnen";
  const lg=document.createElement("div"); lg.className="linkgrid";
  for(const ag of AGENTS){
    const tpl=hasRef?(ag.t[it.pf]||ag.t["*"]):(raw?ag.t["*"]:null);
    if(!tpl) continue;
    const a=document.createElement("a");
    a.href=fill(tpl,it); a.target="_blank"; a.rel="noopener noreferrer";
    a.textContent=ag.n;
    if(ag.fav){a.classList.add("fav");a.textContent="★ "+ag.n;}
    lg.appendChild(a);
  }
  info.append(secA,lg);

  if(raw){
    const secQ=document.createElement("div"); secQ.className="mod-sec"; secQ.textContent="QC-Fotos suchen";
    const qg=document.createElement("div"); qg.className="linkgrid";
    for(const q of QCDBS){
      const tpl=hasRef?(q.t[it.pf]||q.t["*"]):q.t["*"];
      if(!tpl) continue;
      const a=document.createElement("a");
      a.href=fill(tpl,it); a.target="_blank"; a.rel="noopener noreferrer";
      a.textContent=q.n;
      qg.appendChild(a);
    }
    info.append(secQ,qg);
  }

  grid.append(imgBox,info);
  m.append(close,grid);
  back.appendChild(m);
  document.body.appendChild(back);
  document.body.classList.add("modal-open");

  const dispose=()=>{back.remove();document.body.classList.remove("modal-open");document.removeEventListener("keydown",esc);};
  const esc=e=>{if(e.key==="Escape")dispose();};
  close.addEventListener("click",dispose);
  back.addEventListener("click",e=>{if(e.target===back)dispose();});
  document.addEventListener("keydown",esc);
  close.focus();
}

function buildFilters(){
  const cats=[...new Set(DATA.map(i=>i.c))];
  const order=["Schuhe","Shirts & Tees","Hoodies & Sweater","Jacken","Hosen & Shorts","Trikots","Taschen","Uhren","Schmuck & Accessoires","Parfum","Elektronik","Sonstiges"];
  cats.sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  const chips=$("#chips");
  const all=document.createElement("button");
  all.className="chip on"; all.textContent="Alle"; all.dataset.cat="";
  chips.appendChild(all);
  for(const c of cats){
    const el=document.createElement("button");
    el.className="chip"; el.textContent=c; el.dataset.cat=c;
    chips.appendChild(el);
  }
  chips.addEventListener("click",e=>{
    const btn=e.target.closest(".chip"); if(!btn) return;
    chips.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===btn));
    activeCat=btn.dataset.cat;
    apply();
  });
  const srcs=[...new Set(DATA.map(i=>i.s))].sort();
  for(const s of srcs){
    const o=document.createElement("option");
    o.value=s; o.textContent=s;
    $("#src").appendChild(o);
  }
}

let deb;
$("#q").addEventListener("input",()=>{clearTimeout(deb);deb=setTimeout(apply,90)});
$("#src").addEventListener("change",apply);
$("#sort").addEventListener("change",apply);
$("#more").addEventListener("click",renderMore);

fetch("items.json")
  .then(r=>r.json())
  .then(d=>{
    DATA=Array.isArray(d)?d:d.items;
    const M=d.meta||{};
    if(M.rates) RATES=M.rates;
    if(M.sources){
      for(const it of DATA){
        it.s=M.sources[it.s]??it.s;
        it.c=M.cats[it.c]??it.c;
        if(it.i&&/^\d:/.test(it.i)){
          const k=it.i.indexOf(":");
          it.i=M.iprefix[+it.i.slice(0,k)]+it.i.slice(k+1);
        }
      }
    }
    for(const it of DATA) it._h=fold(it.n+" "+(it.b||"")+" "+it.c+" "+it.s+" "+(it.t||""));
    $("#loading").hidden=true;
    buildFilters();
    apply();
    $("#foot").textContent=
      `Kina Search - aggregiert aus ${new Set(DATA.map(i=>i.s)).size} Spreadsheets. `+
      `Preise wie in der Quelle angegeben, ohne Gewaehr. Links oeffnen extern.`;
  })
  .catch(()=>{$("#loading").textContent="items.json konnte nicht geladen werden.";});
</script>
